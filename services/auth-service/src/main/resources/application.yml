server:
  port: 4000

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${DB_USER:auth_user}
    password: ${DB_PASS:password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false

jwt:
  access-secret: ${JWT_ACCESS_SECRET:replace_with_access_secret}
  refresh-secret: ${JWT_REFRESH_SECRET:replace_with_refresh_secret}
  access-ttl-seconds: ${ACCESS_TTL_SECONDS:900}
  refresh-ttl-days: ${REFRESH_TTL_DAYS:30}
